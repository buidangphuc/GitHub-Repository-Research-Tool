services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: github-repository-research-tool:latest
    container_name: research_app
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      SQS_ENDPOINT_URL: ${SQS_ENDPOINT_URL:-http://elasticmq:9324}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-http://elasticmq:9324/000000000000/research-jobs}
      SQS_DLQ_URL: ${SQS_DLQ_URL:-http://elasticmq:9324/000000000000/research-jobs-dlq}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticmq:
        condition: service_started
    ports:
      - "${APP_PORT:-8000}:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  research-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: github-repository-research-tool:latest
    container_name: research_worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      SQS_ENDPOINT_URL: ${SQS_ENDPOINT_URL:-http://elasticmq:9324}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-http://elasticmq:9324/000000000000/research-jobs}
      SQS_DLQ_URL: ${SQS_DLQ_URL:-http://elasticmq:9324/000000000000/research-jobs-dlq}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticmq:
        condition: service_started
    command: ["uv", "run", "python", "-m", "app.research.worker.sqs_worker"]

  elasticmq:
    image: softwaremill/elasticmq-native:1.6.15
    container_name: research_elasticmq
    restart: unless-stopped
    ports:
      - "9324:9324"

  postgres:
    image: postgres:16-alpine
    container_name: research_postgres
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-research}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-research}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: research_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
